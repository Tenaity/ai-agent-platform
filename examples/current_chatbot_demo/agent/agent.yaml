id: snp.customer_service.current_chatbot_demo
version: 0.1.0
owner: platform-team
domain: customer_service
runtime:
  type: langgraph
  graph: examples.current_chatbot_demo.agent.graph:build_graph
  state_schema: examples.current_chatbot_demo.agent.state:CurrentChatbotDemoState
model_policy:
  provider: none
  model: deterministic-placeholder
  allow_real_calls: false
memory: null
retrieval:
  provider: future-qdrant
  config: examples/current_chatbot_demo/qdrant/config.example.yaml
tools:
  allowed:
    - snp.customer_service.container_tracking
    - snp.customer_service.booking_status
    - snp.customer_service.support_ticket
  requires_gateway: true
safety:
  policy: default
  human_review_required: false
observability:
  tracing: true
  project: snp.customer_service.current_chatbot_demo
eval:
  dataset: examples/current_chatbot_demo/agent/evals/eval.yaml
  min_pass_rate: 1.0

